# Configures GitHub's auto-generated release notes (the "Generate release notes"
# button in the UI and `gh release create --generate-notes`). PRs are grouped
# into these categories by their labels; anything unmatched lands in the `*`
# catch-all so nothing is dropped.
changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🚀 Features
      labels:
        - enhancement
        - feature
    - title: 🐛 Fixes
      labels:
        - bug
        - fix
    - title: 📦 Dependencies
      labels:
        - dependencies
    - title: 📝 Documentation
      labels:
        - documentation
    - title: 🧰 Other Changes
      labels:
        - "*"
