name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run E2E tests
        env:
          ECWID_E2E: '1'
          ECWID_STORE_ID: ${{ secrets.ECWID_STORE_ID }}
          ECWID_TOKEN: ${{ secrets.ECWID_TOKEN }}
        run: task e2e
