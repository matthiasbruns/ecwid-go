name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: golangci-lint config
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: config

      - name: golangci-lint ecwid
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: ecwid

      - name: golangci-lint cli
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: cli

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Test config
        run: go test ./config/... -race -count=1

      - name: Test ecwid
        run: go test ./ecwid/... -race -count=1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build CLI
        run: go build -o ./bin/ecwid ./cli/

      - name: Verify binary
        run: ./bin/ecwid version
