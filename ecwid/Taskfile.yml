version: '3'

tasks:
  lint:
    desc: Run golangci-lint on ecwid module
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: Run golangci-lint with auto-fix on ecwid module
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - golangci-lint run --fix ./...

  test:
    desc: Run tests for ecwid module
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - go test ./... -race -count=1

  tidy:
    desc: Run go mod tidy for ecwid module
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - go mod tidy
